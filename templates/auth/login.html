<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — StudyHub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/forms.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth/auth.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Password toggle button */
        .password-field-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-field-wrapper .form-input {
            width: 100%;
            padding-right: 44px;
        }
        .password-toggle-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            padding: 0;
            background: transparent;
            border: none;
            cursor: pointer;
            color: rgba(243,245,251,0.4);
            border-radius: 6px;
            transition: color 0.15s;
        }
        .password-toggle-btn:hover { color: rgba(243,245,251,0.75); }
        .password-toggle-btn:focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 2px;
        }
        .password-toggle-btn svg { display: block; }
        .password-toggle-btn .hidden { display: none; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">

            <!-- Logo -->
            <div class="auth-logo-row">
                <a href="/" class="auth-wordmark">StudyHub</a>
                <div class="auth-wordmark-dot"></div>
            </div>

            <!-- Live badge -->
            <div class="auth-live-badge">
                <span class="auth-live-dot"></span>
                Students online now
            </div>

            <!-- Heading -->
            <div class="auth-header">
                <h1 class="auth-title">Welcome back</h1>
                <p class="auth-subtitle">Pick up where you left off — your people are waiting.</p>
            </div>

            <!-- Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username_or_email" class="form-label required">Username or email</label>
                    <input type="text"
                           id="username_or_email"
                           name="username_or_email"
                           class="form-input"
                           placeholder="john or john@university.edu"
                           required
                           autocomplete="username">
                    <span class="form-error hidden" id="username_error"></span>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label required">Password</label>
                    <div class="password-field-wrapper">
                        <input type="password"
                               id="password"
                               name="password"
                               class="form-input"
                               placeholder="Enter your password"
                               required
                               autocomplete="current-password">
                        <button type="button"
                                class="password-toggle-btn"
                                id="password-toggle-btn"
                                aria-label="Show password"
                                aria-pressed="false">
                            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="icon-eye-off hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <span class="form-error hidden" id="password_error"></span>
                </div>

                <!-- Remember me + forgot password -->
                <div class="auth-remember-row">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember_me" name="remember_me">
                        <label for="remember_me">Remember me</label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" id="submit-btn">
                    Log in
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider"><span>or</span></div>

            <!-- Google -->
            <button class="google-btn" id="google-login-btn">
                <img src="https://www.svgrepo.com/show/355037/google.svg" alt="Google logo">
                Continue with Google
            </button>

            <!-- Footer -->
            <div class="auth-footer">
                Don't have an account? <a href="/google/start">Create one free</a>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='js/core/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/core/utils.js') }}"></script>
    <script>
document.addEventListener("DOMContentLoaded", async () => {
    // Prefill email from Google OAuth if available
    try {
        const res = await fetch("/student/google_temp_info");
        const data = await res.json();
        if (data.email) {
            document.getElementById("username_or_email").value = data.email;
            if (typeof showToast === 'function') showToast("Email prefilled from Google", "info");
        }
    } catch (e) { /* no-op */ }

    // Google button
    const googleBtn = document.getElementById("google-login-btn");
    if (googleBtn) {
        googleBtn.addEventListener("click", () => {
            window.location.href = "/google/start";
        });
    }

    // Form submit
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await handleLogin(e);
    });

    // Auto-focus
    document.getElementById('username_or_email').focus();

    // Password toggle
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('password-toggle-btn');
    if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener('click', () => {
            const isHidden = passwordInput.type === 'password';
            passwordInput.type = isHidden ? 'text' : 'password';
            toggleBtn.querySelector('.icon-eye').classList.toggle('hidden', isHidden);
            toggleBtn.querySelector('.icon-eye-off').classList.toggle('hidden', !isHidden);
            toggleBtn.setAttribute('aria-pressed', String(isHidden));
            toggleBtn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
        });
    }
});

async function handleLogin(e) {
    clearAllErrors();

    const formData = new FormData(e.target);
    const data = {
        username_or_email: formData.get('username_or_email').trim().toLowerCase(),
        password: formData.get('password')
    };

    if (!data.username_or_email) { showFieldError('username', 'Username or email is required'); return; }
    if (!data.password)          { showFieldError('password', 'Password is required'); return; }

    const submitBtn = document.getElementById('submit-btn');

    try {
        setButtonLoading(submitBtn, true, 'Logging in...');
        const result = await api.post('/login', data);

        if (result.status === 'success') {
            if (typeof showToast === 'function') showToast('Welcome back! Redirecting...', 'success');
            await clearGoogleSession();
            setTimeout(() => {
                window.location.href = result.data?.redirect || '/student/profile/homepage';
            }, 1000);
        } else {
            throw new Error(result.message || 'Login failed');
        }
    } catch (error) {
        setButtonLoading(submitBtn, false);
        const msg = error.message || 'Login failed. Please try again.';

        if (msg.includes('Invalid credentials')) {
            if (typeof showToast === 'function') showToast('Invalid username/email or password', 'error');
            showFieldError('password', 'Incorrect password');
        } else if (msg.includes('verify your email')) {
            if (typeof showToast === 'function') showToast('Please verify your email first. Check your inbox.', 'warning', 5000);
        } else if (msg.includes('complete your registration')) {
            if (typeof showToast === 'function') showToast('Please complete your registration', 'warning');
        } else {
            if (typeof showToast === 'function') showToast(msg, 'error');
            else alert(msg);
        }
    }
}

function showFieldError(fieldName, message) {
    const inputId = fieldName === 'username' ? 'username_or_email' : fieldName;
    const input = document.getElementById(inputId);
    const errorEl = document.getElementById(fieldName + '_error');
    if (input)   input.classList.add('error');
    if (errorEl) { errorEl.classList.remove('hidden'); errorEl.textContent = message; }
}

function clearAllErrors() {
    document.querySelectorAll('.form-error').forEach(el => { el.classList.add('hidden'); el.textContent = ''; });
    document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));
}

function setButtonLoading(button, loading, text = '') {
    if (loading) {
        button.disabled = true;
        button.dataset.originalText = button.textContent;
        button.textContent = text || 'Loading...';
    } else {
        button.disabled = false;
        button.textContent = button.dataset.originalText || 'Log in';
    }
}

async function clearGoogleSession() {
    try { await api.post("/clear-session", {}); } catch (e) { /* no-op */ }
}
    </script>
</body>
</html>
