<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learnora — AI Learning Assistant</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Learnora stylesheet -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/learnora/learnora.css') }}">

  <!-- Highlight.js — code syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (window.hljs) hljs.configure({ ignoreUnescapedHTML: true });
    });
  </script>

</head>

<body>

  <section id="learnora" class="section">
    <div class="lr-root active">

      <!-- Mobile overlay (tap to close sidebar) -->
      <div id="lr-overlay" class="lr-overlay" data-action="learnora-close-sidebar"></div>

      <!-- ── Sidebar ─────────────────────────────────────────────────────── -->
      <aside id="lr-sidebar" class="lr-sidebar">
        <div class="lr-sidebar-header">
          <span class="lr-sidebar-title">Learnora</span>
          <button class="lr-new-btn" data-action="learnora-new-chat" title="New conversation" aria-label="New conversation">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New
          </button>
        </div>

        <div id="lr-conv-list" class="lr-conv-list" role="list" aria-label="Conversations">
          <!-- Populated by learnora.events.js -->
        </div>
      </aside>

      <!-- ── Main chat area ──────────────────────────────────────────────── -->
      <div class="lr-main">

        <!-- Chat header -->
        <header class="lr-chat-header">
          <button class="lr-toggle-btn"
                  data-action="learnora-toggle-sidebar"
                  title="Toggle sidebar"
                  aria-label="Toggle sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>

          <h2 id="lr-chat-title"
              class="lr-chat-title"
              data-action="learnora-edit-title"
              title="Double-click to rename"
              role="heading"
              aria-level="2">
            Learnora AI
          </h2>

          <div class="lr-header-actions">
            <select id="lr-mode-select"
                    class="lr-mode-select"
                    data-action="learnora-change-mode"
                    title="Response mode"
                    aria-label="Response mode">
              <option value="fast_response">⚡ Fast</option>
              <option value="deep_think">🧠 Deep Think</option>
              <option value="programming">💻 Code</option>
              <option value="research">🔬 Research</option>
              <option value="summarize">📋 Summarize</option>
              <option value="explain">🎓 Explain</option>
            </select>
          </div>
        </header>

        <!-- Messages -->
        <div id="lr-messages"
             class="lr-messages"
             role="log"
             aria-live="polite"
             aria-label="Chat messages">
          <!-- Populated dynamically -->
        </div>

        <!-- Scroll-to-bottom FAB (appears when user scrolls up during streaming) -->
        <button id="lr-scroll-to-bottom" class="lr-scroll-fab" style="display:none;" aria-label="Scroll to bottom">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <!-- Input area -->
        <div class="lr-input-area">

          <!-- Attached file previews -->
          <div id="lr-file-previews" class="lr-file-previews hidden" aria-label="Attached files">
            <!-- Chips populated by learnora.events.js -->
          </div>

          <!-- Input row (attach + textarea + send) -->
          <div class="lr-input-row">
            <input type="file"
                   id="lr-file-input"
                   multiple
                   accept=".jpg,.jpeg,.png,.webp,.gif,.pdf,.txt,.csv,.doc,.docx,.py,.js,.ts,.html,.css"
                   class="hidden"
                   aria-hidden="true">

            <button class="lr-attach-btn"
                    data-action="learnora-attach-file"
                    title="Attach file"
                    aria-label="Attach file">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>

            <textarea id="lr-input-text"
                      class="lr-textarea"
                      placeholder="Ask Learnora anything… (Shift+Enter for new line)"
                      rows="1"
                      aria-label="Message input"
                      aria-multiline="true"></textarea>

            <button id="lr-send-btn"
                    class="lr-send-btn"
                    data-action="learnora-send"
                    title="Send message"
                    aria-label="Send message">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>

          <!-- Quota display -->
          <div id="lr-quota-display" aria-label="Daily message quota">
            <!-- Populated by learnora.events.js -->
          </div>

        </div><!-- /lr-input-area -->
      </div><!-- /lr-main -->
    </div><!-- /lr-root -->
  </section>
  <div id="lr-conv-menu" class="lr-conv-menu" role="menu" style="display: none;">
  <button data-conv-action="rename" class="lr-conv-menu-item" role="menuitem">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    Rename
  </button>
  <button data-conv-action="clear" class="lr-conv-menu-item" role="menuitem">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>
    Clear messages
  </button>
  <button data-conv-action="delete" class="lr-conv-menu-item lr-conv-menu-item--danger" role="menuitem">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
    </svg>
    Delete conversation
  </button>
</div>
      <script src="{{url_for('static', filename='js/core/api.js')}}"></script>
  <script type="module" src="/static/js/learnora/learnora.init.js"></script>

  <!-- Rename conversation modal -->
  <div id="lr-rename-modal" class="lr-modal-backdrop" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="lr-rename-label">
    <div class="lr-modal">
      <label id="lr-rename-label" class="lr-modal__label">Rename conversation</label>
      <input id="lr-rename-input" class="lr-modal__input" type="text" maxlength="200" placeholder="Conversation title…" />
      <div class="lr-modal__actions">
        <button id="lr-rename-cancel" class="lr-modal__btn lr-modal__btn--ghost">Cancel</button>
        <button id="lr-rename-save"   class="lr-modal__btn lr-modal__btn--primary">Save</button>
      </div>
    </div>
  </div>
</body>
</html>
